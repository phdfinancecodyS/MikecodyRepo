[build]
builder = "nixpacks"
buildCommand = "python3 -m pip install -r ask-anyway/cce-backend/requirements.txt"

[deploy]
startCommand = "cd ask-anyway/cce-backend && uvicorn src.app:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
