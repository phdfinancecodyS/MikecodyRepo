<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ask Anyway</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #000;
    --text: #f0ece4;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* ─── Animations ─── */
  @keyframes fadeIn  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeOut { from { opacity:1; transform:translateY(0); }   to { opacity:0; transform:translateY(-10px); } }
  @keyframes blink   { 50% { opacity:0; } }
  @keyframes dotBounce {
    0%,60%,100% { transform:translateY(0); opacity:.2; }
    30%          { transform:translateY(-8px); opacity:1; }
  }

  /* ─── Page container ─── */
  #page {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 28px 48px;
  }

  #page.out {
    animation: fadeOut .34s ease forwards;
    pointer-events: none;
  }

  /* ─── Brand ─── */
  .brand {
    position: fixed;
    top: 28px; left: 50%; transform: translateX(-50%);
    font-size: .6rem;
    font-weight: 600;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: #555;
    white-space: nowrap;
    z-index: 10;
  }

  /* ─── Content wrapper ─── */
  .page-content {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .page-content.entering { animation: fadeIn .44s ease both; }

  /* ─── AI prompt text ─── */
  .ai-prompt {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
    letter-spacing: -.03em;
    margin-bottom: 48px;
    white-space: pre-wrap;
  }

  /* words snap in during typewriter */
  .ai-prompt .tw-word {
    display: inline-block;
    opacity: 0;
    transform: translateY(6px);
    animation: wordIn .18s ease forwards;
  }

  @keyframes wordIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .cursor {
    display: inline-block;
    width: .55em; height: .85em;
    background: var(--text);
    margin-left: 3px;
    vertical-align: text-bottom;
    animation: blink .75s step-end infinite;
    border-radius: 1px;
  }

  /* ─── Echo: muted repeat of user's last message ─── */
  .echo {
    font-size: .72rem;
    color: #555;
    margin-bottom: 20px;
    font-style: italic;
  }

  /* ─── Emoji selector (page 1 only) ─── */
  .emoji-row {
    display: flex;
    gap: 36px;
    align-items: flex-start;
    transition: opacity .6s ease;
  }

  .emoji-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 0;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform .18s ease;
  }

  .emoji-btn .face {
    font-size: 3.6rem;
    line-height: 1;
    display: block;
    filter: grayscale(20%);
    transition: transform .18s ease, filter .18s ease;
  }

  .emoji-btn .label {
    font-size: .62rem;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #666;
    transition: color .18s;
  }

  .emoji-btn:hover .face {
    transform: translateY(-6px) scale(1.12);
    filter: grayscale(0%);
  }

  .emoji-btn:hover .label { color: #ccc; }

  .emoji-btn:active .face { transform: scale(.92); }

  /* ─── Text input (page 2+) ─── */
  .page-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #2a2a2a;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 300;
    padding: 10px 0;
    outline: none;
    caret-color: var(--text);
    transition: border-color .2s;
  }

  .page-input:focus { border-color: #555; }
  .page-input::placeholder { color: #444; }

  .input-hint {
    font-size: .6rem;
    color: #333;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-top: 10px;
    transition: color .25s;
  }

  .input-hint.ready { color: #777; }

  /* ─── Thinking dots ─── */
  .thinking {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 36px;
    height: 2rem;
  }

  .thinking-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #444;
    animation: dotBounce .9s ease-in-out infinite;
  }

  .thinking-dot:nth-child(2) { animation-delay: .14s; }
  .thinking-dot:nth-child(3) { animation-delay: .28s; }

  /* ─── Recommendation cards ─── */
  .rec-label {
    font-size: .6rem;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: #777;
    margin-bottom: 14px;
  }

  .rec-list {
    display: flex;
    flex-direction: column;
    gap: 9px;
    width: 100%;
    margin-bottom: 20px;
  }

  .rec-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 16px;
    background: #070707;
    border: 1px solid #121212;
    border-radius: 12px;
    text-decoration: none;
    transition: border-color .18s, background .18s;
    cursor: pointer;
  }

  .rec-item:hover { background: #0c0c0c; border-color: #1e1e1e; }
  .rec-icon { font-size: 1.1rem; flex-shrink:0; width:22px; text-align:center; }
  .rec-content { flex: 1; }
  .rec-title { font-size: .85rem; font-weight: 500; color: #ccc9c2; line-height: 1.3; }
  .rec-desc  { font-size: .7rem; color: #777; margin-top: 2px; line-height: 1.4; }

  .rec-item.crisis  { border-color: #280d0d; background: #080404; }
  .rec-item.crisis:hover { border-color: #3a1212; }
  .rec-item.crisis .rec-title { color: #a02828; }

  .rec-item.sms    { border-color: #0c1f14; background: #040908; }
  .rec-item.sms:hover { border-color: #162e1e; }
  .rec-item.sms .rec-title { color: #306845; }

  .rec-item.pdf    { border-color: #0e1526; background: #040508; }
  .rec-item.pdf:hover { border-color: #182438; }
  .rec-item.pdf .rec-title { color: #4060c0; }

  .rec-item.local  { border-color: #1e160a; background: #080603; }
  .rec-item.local:hover { border-color: #2e2010; }
  .rec-item.local .rec-title { color: #906828; }

  /* ─── Free tag inline badge ─── */
  .free-tag {
    display: inline-block;
    font-size: .5rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #22c55e;
    border: 1px solid #22c55e44;
    background: #22c55e0d;
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 7px;
    vertical-align: middle;
    line-height: 1.6;
  }

  /* ─── Restart link ─── */
  .restart-link {
    font-size: .68rem;
    color: #444;
    text-decoration: none;
    letter-spacing: .06em;
    margin-top: 6px;
    cursor: pointer;
    transition: color .2s;
    display: inline-block;
  }

  .restart-link:hover { color: #aaa; }

  /* ─── CCE Choice buttons ─── */
  .choice-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 12px;
    width: 100%;
    max-width: 540px;
  }
  .choice-btn {
    background: transparent;
    border: 1.5px solid #333;
    border-radius: 8px;
    color: #eee;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    padding: 14px 20px;
    text-align: left;
    cursor: pointer;
    transition: background .18s, border-color .18s, color .18s;
    letter-spacing: -.01em;
    line-height: 1.3;
  }
  .choice-btn:hover { background: #222; border-color: #eee; color: #fff; }
  .choice-btn:active { background: #333; }

  /* ─── CCE Outcome band pill ─── */
  .band-pill {
    display: inline-block;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 12px;
  }
  .cce-disclaimer {
    font-size: .72rem;
    color: #555;
    margin-top: 16px;
    line-height: 1.5;
  }

  /* ─── Tagline / safe-space note ─── */
  .tagline {
    font-size: .72rem;
    color: #555;
    letter-spacing: .04em;
    margin-bottom: 40px;
    line-height: 1.6;
  }
  .tagline strong { color: #888; font-weight: 600; }

  /* ─── Free badge ─── */
  .free-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #22c55e;
    border: 1px solid #22c55e44;
    background: #22c55e0d;
    border-radius: 99px;
    padding: 3px 10px;
    margin-bottom: 20px;
  }

  /* ─── Progress dots ─── */
  .progress-row {
    display: flex;
    gap: 7px;
    align-items: center;
    margin-bottom: 28px;
  }
  .pd {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #222;
    transition: background .35s, transform .35s;
  }
  .pd.active  { background: #f0ece4; transform: scale(1.25); }
  .pd.done    { background: #444; }

  /* ─── Stay talking prompt ─── */
  .reply-prompt {
    font-size: .72rem;
    color: #555;
    letter-spacing: .04em;
    margin-top: 18px;
    font-style: italic;
  }

  /* ─── Beta feedback ─── */
  .beta-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 26px;
    padding-top: 20px;
    border-top: 1px solid #181818;
  }
  .beta-label {
    font-size: .6rem;
    color: #444;
    letter-spacing: .08em;
    text-transform: uppercase;
    flex: 1;
  }
  .beta-btn {
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #888;
    font-family: inherit;
    font-size: .7rem;
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color .18s, color .18s;
    white-space: nowrap;
  }
  .beta-btn:hover { border-color: #555; color: #ccc; }

  /* ─── Beta feedback modal ─── */
  #beta-modal {
    display: none;
    position: fixed; inset: 0;
    background: #000000cc;
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #beta-modal.open { display: flex; }
  .beta-modal-box {
    background: #0d0d0d;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
    animation: fadeIn .3s ease both;
  }
  .beta-modal-title {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .beta-modal-sub {
    font-size: .75rem;
    color: #555;
    margin-bottom: 18px;
    line-height: 1.5;
  }
  .beta-stars {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .star-btn {
    font-size: 1.6rem;
    background: none;
    border: none;
    cursor: pointer;
    opacity: .3;
    transition: opacity .15s, transform .15s;
  }
  .star-btn.lit, .star-btn:hover { opacity: 1; transform: scale(1.15); }
  .beta-textarea {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid #222;
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: .85rem;
    padding: 10px 12px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 14px;
  }
  .beta-textarea:focus { border-color: #444; }
  .beta-textarea::placeholder { color: #333; }
  .beta-submit-row {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .beta-cancel {
    background: none;
    border: none;
    color: #444;
    font-family: inherit;
    font-size: .78rem;
    cursor: pointer;
    padding: 8px 14px;
    transition: color .18s;
  }
  .beta-cancel:hover { color: #888; }
  .beta-send {
    background: #f0ece4;
    color: #000;
    border: none;
    border-radius: 7px;
    font-family: inherit;
    font-size: .78rem;
    font-weight: 600;
    padding: 8px 18px;
    cursor: pointer;
    transition: background .18s;
  }
  .beta-send:hover { background: #fff; }

  /* ─── Responsive ─── */
  @media (max-width: 500px) {
    .ai-prompt { font-size: 1.7rem; margin-bottom: 28px; letter-spacing: -.02em; }
    .emoji-btn .face { font-size: 2.8rem; }
    .emoji-row { gap: 24px; }
    #page { padding: 0 20px 40px; }
    .tagline { font-size: .68rem; }
    .choice-btn { font-size: .9rem; padding: 13px 16px; }
  }
</style>
</head>
<body>

<!-- ═══ SINGLE PAGE CONTAINER ═══ -->
<div id="page">
  <div class="brand">Ask Anyway <span style="color:#444;font-size:.5rem;letter-spacing:.16em;border:1px solid #333;border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:middle">BETA</span></div>
  <div id="content" class="page-content">
    <!-- rendered by JS -->
  </div>
</div>

<!-- Beta Feedback Modal -->
<div id="beta-modal">
  <div class="beta-modal-box">
    <div class="beta-modal-title">How was this?</div>
    <div class="beta-modal-sub">You're helping us shape something real. Takes 20 seconds.</div>
    <div class="beta-stars" id="star-row">
      <button class="star-btn" data-val="1" onclick="starClick(1)">⭐</button>
      <button class="star-btn" data-val="2" onclick="starClick(2)">⭐</button>
      <button class="star-btn" data-val="3" onclick="starClick(3)">⭐</button>
      <button class="star-btn" data-val="4" onclick="starClick(4)">⭐</button>
      <button class="star-btn" data-val="5" onclick="starClick(5)">⭐</button>
    </div>
    <textarea class="beta-textarea" id="beta-text" placeholder="What worked? What felt off? (optional)"></textarea>
    <div class="beta-submit-row">
      <button class="beta-cancel" onclick="closeBetaModal()">cancel</button>
      <button class="beta-send" onclick="submitBetaFeedback()">Send feedback</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
//  CHATBASE CONFIG
//  Paste your Chatbase bot ID to route through the real API.
//  Leave empty to use the built-in Ask Anyway engine.
// ─────────────────────────────────────────────────────────────
const CHATBASE_BOT_ID = '';   // e.g. 'abc123xyz'
const CHATBASE_API_URL = 'https://www.chatbase.co/api/v1/chat';

// ─────────────────────────────────────────────────────────────
//  CCE BACKEND INTEGRATION
//  Auto-connects to http://localhost:8000 (started via start.sh).
//  Falls back to the local Ask Anyway engine if server is unreachable.
// ─────────────────────────────────────────────────────────────
const CCE_BASE  = 'http://localhost:8000';
const CCE_TREE  = 'main-flow';
let cceSessionId = null;
let cceActive    = false;

async function cceStart() {
  try {
    const res = await fetch(`${CCE_BASE}/session/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tree_id: CCE_TREE }),
    });
    if (!res.ok) throw new Error('not ok');
    const data = await res.json();
    cceSessionId = data.session_id;
    cceActive    = true;
    return data;
  } catch (_) {
    cceActive = false;
    return null;
  }
}

async function cceCall(optionId, message) {
  if (!cceActive || !cceSessionId) return null;
  try {
    const body = {};
    if (optionId) body.option_id = optionId;
    if (message)  body.message   = message;
    const res = await fetch(`${CCE_BASE}/session/${cceSessionId}/respond`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('not ok');
    return await res.json();
  } catch (_) {
    cceActive = false;
    return null;
  }
}

function cceDataToResponse(data) {
  if (!data) return null;
  if (data.status === 'complete' && data.outcome)
    return { cceOutcome: data.outcome };
  if (data.status === 'in_progress' && data.next_prompt)
    return { ccePrompt: data.next_prompt };
  if (data.status === 'needs_clarification' && data.clarification)
    return { ccePrompt: { question: data.clarification.text, type: 'choice', options: data.clarification.options } };
  return null;
}

function cceOutcomeHTML(outcome) {
  const bandColors = { low_risk:'#22c55e', moderate_risk:'#f59e0b', high_risk:'#ef4444', critical:'#dc2626' };
  const bandLabels = { low_risk:'Low Risk', moderate_risk:'Moderate Risk', high_risk:'High Risk', critical:'Critical' };
  const color = bandColors[outcome.band] || '#888';
  const label = bandLabels[outcome.band] || outcome.band;

  let crisisRows = '';
  if (outcome.crisis_resources && outcome.crisis_resources.length) {
    crisisRows = outcome.crisis_resources.map(r =>
      `<a class="rec-item crisis" href="${r.url || 'tel:988'}">
        <div class="rec-icon">📞</div>
        <div class="rec-content">
          <div class="rec-title">${escHtml(r.name || '988 Lifeline')}</div>
          <div class="rec-desc">${escHtml(r.description || '24/7 crisis support — free')}</div>
        </div>
      </a>`).join('');
  }

  // Use topic-matched guide (or CCE-provided free_resource title if available)
  const guide = TOPIC_GUIDES[ctx.topic || 'general'] || TOPIC_GUIDES.general;
  const guideTitle  = outcome.free_resource ? outcome.free_resource.title  : guide.title;
  const guideUrl    = outcome.free_resource ? '#'                           : guide.url;
  const guideOnClick = outcome.free_resource ? 'onclick="downloadGuide(event)"' : '';

  return `
    <span class="band-pill" style="background:${color}20;color:${color};border:1px solid ${color}40">${escHtml(label)}</span>
    <div class="ai-prompt" style="font-size:1.05rem;margin-bottom:18px;opacity:.9">${escHtml(outcome.summary)}</div>
    <div class="rec-label">All free — open right now</div>
    <div class="rec-list">
      ${crisisRows}
      <a class="rec-item pdf" href="${guideUrl}" ${guideOnClick} target="_blank" rel="noopener">
        <div class="rec-icon">📖</div>
        <div class="rec-content">
          <div class="rec-title">${escHtml(guideTitle)} <span class="free-tag">FREE</span></div>
          <div class="rec-desc">Open right now — no sign-up, no cost</div>
        </div>
      </a>
      <a class="rec-item pdf" href="/guides/daily-checklist.pdf" target="_blank" rel="noopener">
        <div class="rec-icon">✅</div>
        <div class="rec-content">
          <div class="rec-title">Daily Wellbeing Checklist <span class="free-tag">FREE</span></div>
          <div class="rec-desc">A short daily check-in you can do in 2 minutes</div>
        </div>
      </a>
      <a class="rec-item local" href="https://www.psychologytoday.com/us/therapists" target="_blank" rel="noopener">
        <div class="rec-icon">🧠</div>
        <div class="rec-content">
          <div class="rec-title">Find a Local Therapist <span class="free-tag">FREE TO SEARCH</span></div>
          <div class="rec-desc">Filter by insurance, specialty, and distance</div>
        </div>
      </a>
    </div>
    <p class="cce-disclaimer">${escHtml(outcome.disclaimer)}</p>
    <a class="restart-link" onclick="restart()">start over</a>
    ${betaBarHTML()}`;
}

function cceChoiceHTML(options) {
  return `<div class="choice-row">${options.map(o =>
    `<button class="choice-btn" onclick="submitChoice('${o.id.replace(/'/g,"\\'")}','${o.text.replace(/'/g,"\\'")}')">${escHtml(o.text)}</button>`
  ).join('')}</div>`;
}

// ─────────────────────────────────────────────────────────────
//  FUNNEL — TWO TRACKS
//
//  GOOD TRACK:                     NOT GOOD TRACK:
//  Turn 1 → Hear they're fine      Turn 1 → Hear them, one question
//  Turn 2 → "What's your secret?"  Turn 2 → Recommendations immediately
//  Turn 3 → Soft check                       (SMS / PDF / 988 / Local clinic)
//  Turn 4 → Warm close, no push
// ─────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────
//  STATE MACHINE
// ─────────────────────────────────────────────────────────────

const TRACK = { UNKNOWN: 'unknown', GOOD: 'good', NOT_GOOD: 'not_good', RISKY: 'risky' };

const Stage = {
  // Shared
  OPENING: 'opening',          // Stage 1 — first reply
  // Good track
  GOOD_S2: 'good_s2',          // Stage 2 — what's your secret
  GOOD_S3: 'good_s3',          // Stage 3 — light soft check
  GOOD_S4: 'good_s4',          // Stage 4 — warm close
  // Not-good track — 3 turns before recs
  NG_S2: 'ng_s2',              // Stage 2 — one probe question
  NG_S3: 'ng_s3',              // Stage 3 — one more grounding question
  NG_S4: 'ng_s4',              // Stage 4 — recommendations (earned)
  // Risky behavior track
  RISKY_PROBE: 'risky_probe',  // Probe further before routing
  RISKY_END: 'risky_end',      // Route to recs after probing
  // Special
  CRISIS: 'crisis',
  DONE: 'done',
};

let stage = Stage.OPENING;
let track = TRACK.UNKNOWN;
let ctx = {

// ─────────────────────────────────────────────────────────────
//  SENTIMENT ENGINE
//  Scores free text on a -1 (very negative) → +1 (very positive) scale.
//  Uses weighted word pools + negation + intensifier handling.
// ─────────────────────────────────────────────────────────────

const SENTIMENT_VOCAB = {
  // positive — weight 1
  pos1: ['good','fine','okay','ok','well','calm','alright','stable','present','here','okay','coping','managing','surviving','content','safe','supported','connected','clear','grounded'],
  // positive — weight 2
  pos2: ['great','better','happy','glad','grateful','thankful','hopeful','motivated','energized','proud','excited','thriving','peaceful','blessed','loved','confident','optimistic','improving','positive','strong','healing','growing','refreshed','rested'],
  // positive — weight 3
  pos3: ['amazing','fantastic','excellent','wonderful','incredible','outstanding','joyful','elated','ecstatic','fulfilled','inspired','unstoppable'],

  // negative — weight 1
  neg1: ['meh','tired','stressed','worried','nervous','unsure','uncertain','off','blah','drained','flat','foggy','tense','restless','uneasy','sad','low','down','rough','hard','difficult','struggling','lost','stuck'],
  // negative — weight 2
  neg2: ['bad','depressed','anxious','overwhelmed','exhausted','hopeless','worthless','empty','numb','broken','scared','hurt','alone','angry','ashamed','guilty','useless','helpless','trapped','invisible','disconnected','isolated','failing','panicking','grieving','mourning','devastated'],
  // negative — weight 3
  neg3: ['terrible','horrible','awful','unbearable','miserable','desperate','suicidal','destroyed','shattered','collapsing','falling apart','falling apart','can\'t cope','can\'t go on','no point','no reason','ending'],
};

const INTENSIFIERS = new Set(['very','really','so','extremely','absolutely','completely','totally','deeply','incredibly','seriously','genuinely','honestly','truly','quite','super','way']);
const NEGATORS     = new Set(['not','never','no','nor','don\'t','won\'t','can\'t','doesn\'t','didn\'t','isn\'t','wasn\'t','hardly','barely','nothing','neither','without','lack','lacking']);

function scoreSentiment(text) {
  const words = text.toLowerCase().replace(/['']/g, "'").split(/\s+/);
  let score = 0;
  let wordCount = 0;

  for (let i = 0; i < words.length; i++) {
    const w = words[i].replace(/[^a-z']/g, '');
    if (!w) continue;

    // Determine base weight
    let weight = 0;
    if (SENTIMENT_VOCAB.pos1.includes(w)) weight =  1;
    else if (SENTIMENT_VOCAB.pos2.includes(w)) weight =  2;
    else if (SENTIMENT_VOCAB.pos3.includes(w)) weight =  3;
    else if (SENTIMENT_VOCAB.neg1.includes(w)) weight = -1;
    else if (SENTIMENT_VOCAB.neg2.includes(w)) weight = -2;
    else if (SENTIMENT_VOCAB.neg3.includes(w)) weight = -3;

    if (weight === 0) continue;
    wordCount++;

    // Intensifier: look back 1-2 words
    const prev1 = (words[i - 1] || '').replace(/[^a-z']/g, '');
    const prev2 = (words[i - 2] || '').replace(/[^a-z']/g, '');
    if (INTENSIFIERS.has(prev1) || INTENSIFIERS.has(prev2)) {
      weight = weight * 1.5;
    }

    // Negation: look back up to 3 words
    let negated = false;
    for (let j = Math.max(0, i - 3); j < i; j++) {
      if (NEGATORS.has(words[j].replace(/[^a-z']/g, ''))) { negated = true; break; }
    }
    if (negated) weight = weight * -0.8; // flip + dampen (negation rarely fully inverts)

    score += weight;
  }

  // Normalize to -1..+1
  const maxPossible = Math.max(wordCount * 3, 1);
  const normalized = Math.max(-1, Math.min(1, score / maxPossible));

  return {
    score: normalized,
    label: normalized >  0.15 ? 'positive'
         : normalized < -0.1  ? 'negative'
         : 'neutral',
    raw: score,
  };
}

// Attach latest sentiment to ctx so responses can use it
function analyze(t) {
  const s = scoreSentiment(t);
  ctx.sentiment = s;
  return s;
}

// ─────────────────────────────────────────────────────────────
//  DETECTION HELPERS  (keyword-first, sentiment fallback)
// ─────────────────────────────────────────────────────────────

function isGood(t) {
  // Keyword fast-path
  if (/^(good|great|fine|okay|ok|not bad|alright|pretty good|doing well|doing great|blessed|fantastic|amazing|wonderful|solid|well)([.!,\s]|$)/.test(t)
    || /\bi.?m (good|great|fine|okay|doing well|doing great|alright|blessed|fantastic)/.test(t)
    || /things are (good|great|okay|fine|well|going well)/.test(t)) return true;
  // Sentiment fallback — clearly positive
  return analyze(t).score > 0.25;
}

function isNotGood(t) {
  // Keyword fast-path
  if (/(not (okay|ok|doing well|good|great|feeling well)|struggling|overwhelmed|exhausted|burnt out|can.?t cope|falling apart|going through|dark place|depressed|anxious|panic|numb|lost|empty|alone|hopeless|worthless|tired of|can.?t sleep|can.?t eat|rough|hard time|difficult|bad day|bad week|stressed|broke up|breakup|lost my|fired|laid off|grief|grieving|mourning|worried|scared|not sure)/.test(t)
    || /(my (girlfriend|boyfriend|partner|wife|husband|gf|bf|mom|dad|friend|job|dog|cat)|i got|i lost|we broke|she left|he left|they left)/.test(t)) return true;
  // Sentiment fallback — clearly negative
  return analyze(t).score < -0.15;
}

function isCrisis(t) {
  return /suicid|kill my ?self|end it all|don.?t want to (be here|live|exist|wake up)|not worth living|hurt my ?self|self.?harm|no reason to live|can.?t go on|want to die|wanna die|thinking about (ending|killing)|take my (life|own life)/.test(t);
}

function isRisky(t) {
  return /(drinking (to forget|every night|alone|a lot|more than usual|heavily)|drunk (every|most|all the)|blackout|blacking out|can.?t stop drinking|can.?t stop using|using (again|more|every day|to cope)|back on|relapsed|relapse|high (every|most|all the)|pills to sleep|taking (more|extra) pills|cutting (myself|again)|been cutting|punching (walls|things)|reckless|doing (stupid|dangerous|dumb) (stuff|things|shit)|driving (drunk|high)|hooking up (just to|so i don.?t|because i|to numb)|not eating (at all|for days|anything)|haven.?t eaten|stopped eating|can.?t eat|been skipping (meals|eating)|isolation|isolating|hiding|nobody knows|keeping it hidden|not telling anyone)/.test(t);
}

function detectTopic(t) {
  if (/broke up|breakup|girlfriend|boyfriend|gf|bf|partner|relationship|dating|divorce|marriage|she left|he left/.test(t)) return 'relationship';
  if (/fired|laid off|job|work|boss|career|unemployed|money|debt|bills|financial/.test(t)) return 'work';
  if (/died|death|passed away|loss|grief|mourning|widow|funeral|gone/.test(t)) return 'loss';
  if (/anxious|anxiety|panic|attack|worry|overthinking|racing mind/.test(t)) return 'anxiety';
  if (/alone|lonely|isolated|no friends|no one cares|nobody/.test(t)) return 'loneliness';
  if (/family|parents|dad|mom|sibling|kids|children/.test(t)) return 'family';
  if (/drink|alcohol|sober|relapse|drugs|substance/.test(t)) return 'recovery';
  if (/faith|god|church|prayer|spiritual|belief|religion/.test(t)) return 'faith';
  return 'general';
}

function detectAudience(t) {
  if (/veteran|military|deployed|combat|ptsd|army|marines|navy|air force|service member/.test(t)) return 'veteran';
  if (/first responder|firefight|paramedic|emt|police|officer|dispatch/.test(t)) return 'first_responder';
  if (/nurse|doctor|hospital|healthcare|clinician|medical worker/.test(t)) return 'healthcare';
  if (/teacher|school|educator|classroom/.test(t)) return 'educator';
  if (/christian|faith|god|church|prayer|bible/.test(t)) return 'christian';
  if (/lgbtq|gay|lesbian|bisexual|trans|queer|non.?binary/.test(t)) return 'lgbtq';
  if (/single (mom|dad|parent)|raising (my kids|them) alone/.test(t)) return 'single_parent';
  return null;
}

function audienceLayer(base) {
  const overlays = {
    veteran: '\n\nBeing strong doesn\'t mean not struggling. That doesn\'t go away with a discharge date.',
    first_responder: '\n\nYou spend your whole life showing up for others. This space is for you.',
    healthcare: '\n\nYou notice this in patients every day. It\'s harder to recognize in yourself.',
    educator: '\n\nYou carry so many kids. Let this space carry you a little.',
    christian: '\n\nWhatever you believe — you don\'t have to carry this alone.',
    lgbtq: '\n\nYou are allowed to be exactly who you are in this conversation.',
    single_parent: '\n\nEven when you\'re the one holding everything together, you\'re allowed to fall apart a little.',
  };
  return ctx.audience ? base + (overlays[ctx.audience] || '') : base;
}

// ─────────────────────────────────────────────────────────────
//  STAGE RESPONSES
// ─────────────────────────────────────────────────────────────

// ── GOOD TRACK ──────────────────────────────────────────────

function goodS1(userText) {
  // Stage 1 — validate their good and ask what's behind it
  track = TRACK.GOOD;
  stage = Stage.GOOD_S2;
  return `That's really good to hear — and I mean that.\n\nWhat's been making things feel good lately?`;
}

function goodS2(userText) {
  // Stage 2 — reflect what they said back, warm and specific, then close
  const t = userText.toLowerCase();

  // If their answer reads as negative, pivot gently to not-good track
  if (ctx.sentiment && ctx.sentiment.score < -0.1) {
    track = TRACK.NOT_GOOD;
    ctx.topic = detectTopic(t);
    stage = Stage.NG_S2;
    return audienceLayer(`I hear something underneath that.\n\nWhat's actually been going on?`);
  }

  let validation = '';

  if (/family|friends|people|community|connection|loved one/.test(t)) {
    validation = `The people around you — that's everything. That's not small.`;
  } else if (/work|job|career|purpose|project|goal|building|creating/.test(t)) {
    validation = `Having something meaningful to pour into — that does something for the soul.`;
  } else if (/exercise|workout|gym|running|health|sleep|outside|nature|walk/.test(t)) {
    validation = `Taking care of your body like that — most people underestimate how much it carries everything else.`;
  } else if (/faith|god|prayer|grateful|thankful|blessed|peace/.test(t)) {
    validation = `That kind of grounding is real. It's a gift to have it.`;
  } else if (/myself|alone|solo|quiet|rest|recharge/.test(t)) {
    validation = `Knowing what you need and actually giving it to yourself — that's self-awareness people spend years trying to find.`;
  } else {
    validation = `That actually matters more than people realize.`;
  }

  stage = Stage.DONE;
  return `${validation}\n\nHonestly — keep doing what you're doing. And if anything ever shifts, this place is here for that too.`;
}

function goodS3(userText) {
  // Kept for router compatibility — shouldn't normally be reached on good track
  stage = Stage.DONE;
  return `Love that. Keep going.\n\nThis space is here whenever you need it.`;
}

// ── RISKY BEHAVIOR TRACK ─────────────────────────────────────

function riskyProbe(userText) {
  track = TRACK.RISKY;
  const t = userText.toLowerCase();
  ctx.crisisLevel = Math.max(ctx.crisisLevel, 1);

  // First probe — non-judgmental, zero shame, just curious
  if (stage !== Stage.RISKY_PROBE) {
    stage = Stage.RISKY_PROBE;

    if (/drink|alcohol|drunk|blackout/.test(t)) {
      return `I hear you — and I'm not here to judge any of it.

How long has drinking been the thing you're reaching for?`;
    }
    if (/using|high|pills|relapse|relapsed|back on/.test(t)) {
      return `That took honesty to say — thank you for trusting this space with it.

What's been going on underneath that's pushing you back toward it?`;
    }
    if (/cutting|punching|hurting/.test(t)) {
      return `I'm glad you said that. That kind of pain deserves to be taken seriously.

How often has that been happening?`;
    }
    if (/not eating|haven.?t eaten|stopped eating|skipping/.test(t)) {
      return `That's your body telling you something's really off.

How long have things been like this?`;
    }
    if (/hiding|nobody knows|not telling|isolating|isolation/.test(t)) {
      return `Carrying something alone like that is exhausting.

What's stopping you from letting someone in right now?`;
    }
    return `I want to make sure I understand what's going on for you.

How long has this been happening, and is it getting worse?`;
  }

  // Second probe answered — route to recs
  stage = Stage.RISKY_END;
  return buildRecommendations();
}

// ── NOT GOOD TRACK ───────────────────────────────────────────

function ngS1(userText) {
  track = TRACK.NOT_GOOD;
  stage = Stage.NG_S2;
  ctx.topic = detectTopic(userText.toLowerCase());
  ctx.audience = detectAudience(userText.toLowerCase()) || ctx.audience;

  // One empathetic line + one short question
  const openers = {
    relationship: audienceLayer(`That's real, and it hurts.\n\nHow are you holding up right now?`),
    work:         audienceLayer(`That kind of stress hits everything.\n\nHow are you doing with it day to day?`),
    loss:         audienceLayer(`I'm really sorry.\n\nHow are you holding up?`),
    anxiety:      audienceLayer(`That constant pressure is exhausting.\n\nIs this something that just started or has it been building?`),
    loneliness:   audienceLayer(`Feeling that alone is heavy.\n\nHow long has it felt this way?`),
    recovery:     audienceLayer(`That takes a lot to navigate.\n\nHow are you doing with it right now?`),
    faith:        audienceLayer(`I hear you.\n\nWhat's been the hardest part lately?`),
    general:      audienceLayer(`I hear you.\n\nWhat's been the hardest part of it?`),
  };
  return openers[ctx.topic] || openers.general;
}

function ngS2(userText) {
  // Turn 2 — follow-up: go one level deeper
  const t = userText.toLowerCase();
  if (/alone|no one|nobody|no support/.test(t)) {
    ctx.crisisLevel = Math.max(ctx.crisisLevel, 1);
  }
  stage = Stage.NG_S3;

  // Topic-aware follow-up
  const probes = {
    relationship: `Has this hit your sleep or your eating at all — or have you been able to hold that together?`,
    work:         `Is there anyone around you who knows how bad it's gotten, or are you carrying this mostly on your own?`,
    loss:         `Grief isn't linear — are there moments in the day when it's heavier than others?`,
    anxiety:      `When the anxiety spikes, what does that look like for you — is it more physical, or more in your head?`,
    loneliness:   `Is this something that just crept up, or has it been there for longer than you can remember?`,
    recovery:     `When you picture getting through today — what does that look like?`,
    family:       `Is there one person in your corner right now, or does it feel like you're navigating this alone?`,
    general:      `Have you been able to talk to anyone about this, or has most of it stayed inside?`,
  };
  const q = probes[ctx.topic] || probes.general;
  return audienceLayer(q);
}

function ngS3(userText) {
  // Turn 3 — route to recs
  const t = userText.toLowerCase();
  if (/alone|no one|nobody|no support|can.?t tell|can.?t talk|no body knows/.test(t)) {
    ctx.crisisLevel = Math.max(ctx.crisisLevel, 1);
  }
  stage = Stage.NG_S4;
  return buildRecommendations();
}

// ── CRISIS ───────────────────────────────────────────────────

function crisisResponse() {
  stage = Stage.CRISIS;
  return {
    text: `I'm really glad you said that out loud.\n\nI want you to stay here with me for a second.\n\nRight now, the most important thing is making sure you're safe.`,
    card: { type: 'crisis' },
    followup: `Are you safe where you are right now?`,
  };
}

// ── RECOMMENDATIONS ──────────────────────────────────────────

function buildRecommendations() {
  const topic = ctx.topic || 'general';
  const topicLabels = {
    relationship: 'going through a breakup',
    work:         'navigating a work situation',
    loss:         'dealing with loss',
    anxiety:      'working through anxiety',
    loneliness:   'feeling alone',
    family:       'what\'s going on with your family',
    recovery:     'what you\'re navigating with substances',
    faith:        'what you\'re working through',
    general:      'what you\'re going through',
  };
  const label = topicLabels[topic] || topicLabels.general;

  return {
    text: `Here's what I'd actually suggest for ${label}. Pick whichever feels right:`,
    card: { type: 'recommendations', crisisLevel: ctx.crisisLevel },
  };
}

// ─────────────────────────────────────────────────────────────
//  MAIN ROUTER
// ─────────────────────────────────────────────────────────────

async function getResponse(userText, cceOptionId) {
  // ── CCE API mode ──
  if (cceActive && cceSessionId) {
    const data = await cceCall(cceOptionId || null, cceOptionId ? null : userText);
    const cceResp = cceDataToResponse(data);
    if (cceResp) return cceResp;
    // CCE failed or returned unexpected — fall through to local engine
  }

  if (CHATBASE_BOT_ID) return await chatbaseCall(userText);

  ctx.turnCount++;
  const t = userText.toLowerCase().trim();
  const sentiment = analyze(t); // always run — populates ctx.sentiment

  // Crisis check at every stage
  if (isCrisis(t)) {
    ctx.crisisLevel = 2;
    return crisisResponse();
  }

  // Risky behavior check at every stage
  if (isRisky(t)) return riskyProbe(userText);

  // OPENING — Stage 1 — determine track
  if (stage === Stage.OPENING) {
    stepCount = 1;
    ctx.audience = detectAudience(t) || ctx.audience;
    if (isGood(t)) return goodS1(userText);
    if (isNotGood(t)) return ngS1(userText);
    // Sentiment-informed ambiguous response
    if (sentiment.score < -0.05) {
      // Leaning negative but not caught by keywords — route to not-good
      return ngS1(userText);
    }
    if (sentiment.score > 0.1) {
      // Leaning positive — route to good
      return goodS1(userText);
    }
    // Genuinely neutral — ask once more
    stage = Stage.OPENING;
    return `I want to make sure I'm with you.\n\nAre things feeling okay right now, or is there something underneath that you're carrying?`;
  }

  stepCount++;

  // GOOD TRACK
  if (stage === Stage.GOOD_S2) return goodS2(userText);
  if (stage === Stage.GOOD_S3) return goodS3(userText);
  if (stage === Stage.GOOD_S4 || stage === Stage.DONE) {
    return `I'm here if anything changes.\n\nTake care.`;
  }

  // NOT GOOD TRACK — 3 turns before recs
  if (stage === Stage.NG_S2) return ngS2(userText);
  if (stage === Stage.NG_S3) return ngS3(userText);
  if (stage === Stage.NG_S4) return buildRecommendations();

  // RISKY TRACK
  if (stage === Stage.RISKY_PROBE) return riskyProbe(userText);
  if (stage === Stage.RISKY_END) return buildRecommendations();

  // Fallback — keep them talking
  ctx.audience = detectAudience(t) || ctx.audience;
  return audienceLayer(`Say more — I'm listening.`);
}

// ─────────────────────────────────────────────────────────────
//  CHATBASE API CALL
// ─────────────────────────────────────────────────────────────
let chatHistory = [];

async function chatbaseCall(userText) {
  chatHistory.push({ role: 'user', content: userText });
  try {
    const res = await fetch(CHATBASE_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${CHATBASE_BOT_ID}`,
      },
      body: JSON.stringify({
        messages: chatHistory,
        chatbotId: CHATBASE_BOT_ID,
        stream: false,
        temperature: 0.7,
      }),
    });
    const data = await res.json();
    const reply = data?.text || data?.messages?.[0]?.content || 'I\'m here. Tell me more.';
    chatHistory.push({ role: 'assistant', content: reply });
    return reply;
  } catch (e) {
    return 'Something went quiet on my end. Stay with me — what were you saying?';
  }
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function escAttr(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'&#10;');
}

function downloadGuide(e) {
  e.preventDefault();
  const topic = ctx.topic || 'general';

}

function humanDelay(content) {
  const words = (typeof content === 'string' ? content : (content.text || '')).split(' ').length;
  return Math.min(Math.max(words * 55, 800), 2400);
}

}

// ─── Show the "thinking" transition screen ───

function showThinking(echoText) {
  const page    = document.getElementById('page');
  const content = document.getElementById('content');
  page.classList.add('out');
  setTimeout(() => {
    page.classList.remove('out');
    content.innerHTML = '';
    const inner = document.createElement('div');
    inner.className = 'page-content entering';
    inner.innerHTML = `
      ${echoText ? `<div class="echo">"${escHtml(echoText)}"</div>` : ''}
      <div class="thinking">
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
      </div>`;
    content.appendChild(inner);
  }, 360);
}

// ─── Render an AI response as a full page ───

function showResponse(response, echoText) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const inner = document.createElement('div');
  inner.className = 'page-content entering';

  // Progress dots — show on turns 1-3 (not on opening or final screens)
  const showDots = stepCount > 0 && stage !== Stage.DONE && stage !== Stage.GOOD_S4
    && stage !== Stage.NG_S4 && stage !== Stage.RISKY_END && stage !== Stage.CRISIS;
  const totalDots = (track === TRACK.GOOD) ? 3 : 4;
  const dotsHTML = showDots ? progressDotsHTML(Math.min(stepCount - 1, totalDots - 1), totalDots) : '';

  let html = dotsHTML;
  html += echoText ? `<div class="echo">"${escHtml(echoText)}"</div>` : '';

  // ── CCE: complete outcome ──
  if (response && response.cceOutcome) {
    html += cceOutcomeHTML(response.cceOutcome);
    inner.innerHTML = html;
    content.appendChild(inner);
    return;
  }

  // ── CCE: next prompt ──
  if (response && response.ccePrompt) {
    const p = response.ccePrompt;
    html += `<div class="ai-prompt" data-tw="${escAttr(p.question)}"></div>`;
    if (p.type === 'choice' && p.options && p.options.length) {
      html += cceChoiceHTML(p.options);
    } else {
      html += inputHTML();
    }
    inner.innerHTML = html;
    content.appendChild(inner);
    animateTW(inner);
    const inp = content.querySelector('.page-input');
    if (inp) { inp.focus(); wireInput(inp); }
    return;
  }

  // ── Local / Chatbase engine ──
  if (typeof response === 'string') {
    html += `<div class="ai-prompt" data-tw="${escAttr(response)}"></div>`;
    if (stage === Stage.DONE || stage === Stage.GOOD_S4) {
      html += `<a class="restart-link" onclick="restart()">start over</a>${betaBarHTML()}`;
    } else {
      html += inputHTML();
    }
  } else {
    if (response.text) {
      html += `<div class="ai-prompt" data-tw="${escAttr(response.text)}"></div>`;
    }
    if (response.card) {
      if (response.card.type === 'crisis') {
        html += crisisCardsHTML();
      } else if (response.card.type === 'recommendations') {
        html += recCardsHTML(response.card.crisisLevel || 0);
      }
    } else {
      html += inputHTML();
    }
  }

  inner.innerHTML = html;
  content.appendChild(inner);
  animateTW(inner);
  const inp = content.querySelector('.page-input');
  if (inp) { inp.focus(); wireInput(inp); }
}

// ─── Animate all [data-tw] elements inside a container ───
function animateTW(container) {
  const els = container.querySelectorAll('[data-tw]');
  els.forEach(el => {
    const text = el.dataset.tw;
    el.removeAttribute('data-tw');
    typeWriterInto(text, el, null, 85);
  });
}

function inputHTML() {
  return `<input class="page-input" id="page-input" type="text" placeholder="say whatever's on your mind..." autocomplete="off" spellcheck="false"/>
    <div class="input-hint" id="input-hint">press enter to continue</div>`;
}

// ─── Wire keyboard events to any input on screen ───

function wireInput(inp) {
  const hint = document.getElementById('input-hint');
  inp.addEventListener('input', () => {
    if (hint) hint.classList.toggle('ready', inp.value.trim().length > 0);
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = inp.value.trim();
      if (val && !locked) submitText(val);
    }
  });
}

// ─── User text submission ───

async function submitText(text) {
  if (!text.trim() || locked) return;
  locked = true;
  history.push({ role: 'user', content: text });
  lastUserDisplay = text.length > 44 ? text.slice(0, 42) + '…' : text;

  showThinking(lastUserDisplay);

  const response = await getResponse(text);
  await new Promise(r => setTimeout(r, humanDelay(response)));

  history.push({ role: 'ai', content: typeof response === 'string' ? response : (response.text || '') });

  const page    = document.getElementById('page');
  const content = document.getElementById('content');
  page.classList.add('out');
  setTimeout(() => {
    page.classList.remove('out');
    content.innerHTML = '';
    showResponse(response, lastUserDisplay);
    locked = false;
  }, 360);
}

// ─── CCE choice button click ───

async function submitChoice(optionId, optionText) {
  if (locked) return;
  locked = true;
  const display = optionText.length > 44 ? optionText.slice(0, 42) + '…' : optionText;
  history.push({ role: 'user', content: optionText });
  lastUserDisplay = display;

  showThinking(display);

  const response = await getResponse(null, optionId);
  await new Promise(r => setTimeout(r, humanDelay(response)));

  const page    = document.getElementById('page');
  const content = document.getElementById('content');
  page.classList.add('out');
  setTimeout(() => {
    page.classList.remove('out');
    content.innerHTML = '';
    showResponse(response, display);
    locked = false;
  }, 360);
}

// ─── Emoji click handler (page 1) ───

function emojiSelect(which) {
  if (locked) return;
  let userText, display, optionId;
  if (which === 'good') { userText = 'good';       optionId = 'good';   display = '😊'; }
  else if (which === 'meh') { userText = 'kind of meh'; optionId = 'meh'; display = '😐'; }
  else                  { userText = 'not doing well';  optionId = 'bad'; display = '😞'; }

  locked = true;
  history.push({ role: 'user', content: display });
  lastUserDisplay = display;
  showThinking(display);

  getResponse(userText, cceActive ? optionId : null)
    .then(response => new Promise(r => setTimeout(() => r(response), humanDelay(response))))
    .then(response => {
      history.push({ role: 'ai', content: typeof response === 'string' ? response : (response.text || '') });
      const page    = document.getElementById('page');
      const content = document.getElementById('content');
      page.classList.add('out');
      setTimeout(() => {
        page.classList.remove('out');
        content.innerHTML = '';
        showResponse(response, display);
        locked = false;
      }, 360);
    });
}

// ─── Restart conversation ───

function restart() {
  stage = Stage.OPENING;
  track = TRACK.UNKNOWN;
  ctx   = { turnCount: 0, crisisLevel: 0, topic: null, audience: null, askedAboutOthers: false };
  history.length = 0;
  lastUserDisplay = '';
  locked = false;
  stepCount = 0;
  betaRating = 0;
  // Reset CCE session
  cceSessionId = null;
  cceActive = false;
  bootOpening();
}

// ─── Typewriter helper — word-by-word with block cursor ───

function typeWriterInto(text, el, cb, wordDelay = 110) {
  const words = text.split(' ');
  let i = 0;

  // place block cursor immediately
  el.innerHTML = '<span class="cursor"></span>';

  function nextWord() {
    if (i < words.length) {
      // build revealed words as snapping spans
      const revealed = words.slice(0, i + 1).map((w, idx) =>
        idx === i
          ? `<span class="tw-word">${escHtml(w)}</span>`
          : escHtml(w)
      ).join(' ');
      el.innerHTML = revealed + ' <span class="cursor"></span>';
      i++;
      // slight variable pace — punctuation gets a longer beat
      const lastChar = words[i - 1].slice(-1);
      const pause = /[.?!,]/.test(lastChar) ? wordDelay * 2.4 : wordDelay + Math.random() * 40;
      setTimeout(nextWord, pause);
    } else {
      // done — plain text, no cursor
      el.innerHTML = escHtml(text);
      if (cb) cb();
    }
  }

  setTimeout(nextWord, 160);
}

// ─── Boot: render opening emoji page ───

const OPENING_TEXT = 'how are you doing today?';

function bootOpening() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const inner = document.createElement('div');
  inner.className = 'page-content entering';
  inner.innerHTML = `
    <div class="free-badge">✦ free &nbsp;·&nbsp; private &nbsp;·&nbsp; no judgment</div>
    <div class="ai-prompt" id="opening-prompt"></div>
    <div class="tagline" id="tagline" style="opacity:0;transition:opacity .5s ease">
      Pick one — or just type below.
    </div>
    <div class="emoji-row" id="emoji-row" style="opacity:0;transition:opacity .6s ease">
      <button class="emoji-btn" onclick="emojiSelect('good')" title="doing good">
        <span class="face">😊</span>
        <span class="label">Good</span>
      </button>
      <button class="emoji-btn" onclick="emojiSelect('meh')" title="kind of meh">
        <span class="face">😐</span>
        <span class="label">Meh</span>
      </button>
      <button class="emoji-btn" onclick="emojiSelect('bad')" title="not great">
        <span class="face">😞</span>
        <span class="label">Rough</span>
      </button>
    </div>
    <div id="open-input-wrap" style="opacity:0;transition:opacity .6s ease;margin-top:24px;width:100%;max-width:520px">
      <input class="page-input" id="open-input" type="text" placeholder="or tell me in your own words..." autocomplete="off" spellcheck="false"/>
      <div class="input-hint" id="open-hint">press enter to continue</div>
    </div>`;
  content.appendChild(inner);

  setTimeout(() => {
    const promptEl = document.getElementById('opening-prompt');
    if (!promptEl) return;
    typeWriterInto(OPENING_TEXT, promptEl, () => {
      setTimeout(() => {
        const tagline = document.getElementById('tagline');
        const row     = document.getElementById('emoji-row');
        const wrap    = document.getElementById('open-input-wrap');
        if (tagline) tagline.style.opacity = '1';
        if (row)     row.style.opacity     = '1';
        setTimeout(() => { if (wrap) wrap.style.opacity = '1'; }, 200);
        // Wire open text input
        const inp  = document.getElementById('open-input');
        const hint = document.getElementById('open-hint');
        if (inp) {
          inp.addEventListener('input', () => {
            if (hint) hint.classList.toggle('ready', inp.value.trim().length > 0);
          });
          inp.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
              e.preventDefault();
              const val = inp.value.trim();
              if (val && !locked) submitText(val);
            }
          });
        }
      }, 200);
    });
  }, 500);
}

  // Try to connect to CCE backend before rendering the opening screen
  await cceStart();
  bootOpening();
});
