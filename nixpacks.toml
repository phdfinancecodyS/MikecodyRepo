[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python3 -m venv /app/venv",
  "/app/venv/bin/pip install --upgrade pip",
  "/app/venv/bin/pip install -r ask-anyway/cce-backend/requirements.txt"
]

[start]
cmd = "cd ask-anyway/cce-backend && /app/venv/bin/uvicorn src.app:app --host 0.0.0.0 --port $PORT"
