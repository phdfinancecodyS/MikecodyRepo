[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python3 -m ensurepip --upgrade",
  "python3 -m pip install --upgrade pip",
  "python3 -m pip install -r ask-anyway/cce-backend/requirements.txt"
]

[start]
cmd = "cd ask-anyway/cce-backend && uvicorn src.app:app --host 0.0.0.0 --port $PORT"
